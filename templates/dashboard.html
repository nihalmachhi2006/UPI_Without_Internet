<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UPI Offline Mesh</title>
    <style>
      :root {
        --bg: #eef3f8;
        --panel: #ffffff;
        --line: #d8e0ea;
        --text: #162033;
        --muted: #5f6c7b;
        --accent: #0f766e;
        --accent-2: #134e4a;
        --good: #166534;
        --warn: #b45309;
        --bad: #b91c1c;
        --shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        padding: 24px;
        color: var(--text);
        background: linear-gradient(180deg, #f8fbfd 0%, var(--bg) 100%);
        font-family: "Segoe UI", sans-serif;
      }
      .shell {
        max-width: 1240px;
        margin: 0 auto;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }
      h1 {
        font-size: clamp(1.8rem, 4vw, 2.7rem);
        line-height: 1.05;
        letter-spacing: -0.04em;
      }
      .subtitle {
        margin-top: 8px;
        max-width: 58ch;
        color: var(--muted);
      }
      .status {
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.85);
        color: var(--accent-2);
        box-shadow: var(--shadow);
        font-size: 0.92rem;
      }
      .toolbar {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }
      .step-btn,
      .btn {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--text);
        border-radius: 14px;
        box-shadow: var(--shadow);
        cursor: pointer;
        transition:
          transform 0.15s ease,
          border-color 0.15s ease,
          box-shadow 0.15s ease;
      }
      .step-btn {
        padding: 16px;
        text-align: left;
        min-height: 96px;
      }
      .step-btn:hover,
      .btn:hover {
        transform: translateY(-1px);
        border-color: #b6c2cf;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
      }
      .step-num {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
      }
      .step-label {
        margin-top: 8px;
        font-size: 1rem;
        font-weight: 650;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        margin-bottom: 16px;
      }
      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
        body {
          padding: 16px;
        }
      }
      .card {
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(216, 224, 234, 0.9);
        border-radius: 20px;
        padding: 20px;
        box-shadow: var(--shadow);
      }
      .card h2 {
        font-size: 0.84rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        margin-bottom: 16px;
      }
      .btn-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      .btn {
        padding: 11px 16px;
        font-size: 0.95rem;
        font-weight: 650;
      }
      .btn.primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #fff;
        border-color: transparent;
      }
      .btn.secondary {
        background: #fff;
      }
      label {
        display: block;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--muted);
        margin: 14px 0 6px;
      }
      select,
      input {
        width: 100%;
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 12px;
        padding: 11px 12px;
        color: var(--text);
        font-size: 0.96rem;
      }
      select:focus,
      input:focus {
        outline: 2px solid rgba(15, 118, 110, 0.18);
        border-color: var(--accent);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.92rem;
      }
      th {
        text-align: left;
        color: var(--muted);
        font-weight: 600;
        padding: 10px 8px;
        border-bottom: 1px solid var(--line);
      }
      td {
        padding: 11px 8px;
        border-bottom: 1px solid #edf2f7;
      }
      .badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 700;
      }
      .settled {
        background: #dcfce7;
        color: var(--good);
      }
      .duplicate {
        background: #ffedd5;
        color: var(--warn);
      }
      .invalid {
        background: #fee2e2;
        color: var(--bad);
      }
      .log {
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 16px;
        padding: 14px;
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 0.86rem;
        max-height: 240px;
        overflow-y: auto;
        margin-top: 8px;
      }
      .log p {
        padding: 4px 0;
        border-bottom: 1px solid rgba(148, 163, 184, 0.14);
      }
      .device-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid var(--line);
      }
      .device-meta {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .device-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #94a3b8;
        flex-shrink: 0;
      }
      .device-dot.online {
        background: #22c55e;
      }
      .device-chip {
        font-size: 0.78rem;
        color: var(--accent);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div>
          <h1>UPI Offline Mesh</h1>
          <p class="subtitle">
            A compact demo of mesh-routed payments, gossip propagation, and
            bridge settlement.
          </p>
        </div>
        <div class="status">Live dashboard</div>
      </header>

      <div class="toolbar">
        <button class="step-btn" onclick="doSend()">
          <div class="step-num">Step 1</div>
          <div class="step-label">Send packet into mesh</div>
        </button>
        <button class="step-btn" onclick="doGossip()">
          <div class="step-num">Step 2</div>
          <div class="step-label">Run one gossip round</div>
        </button>
        <button class="step-btn" onclick="doFlush()">
          <div class="step-num">Step 3</div>
          <div class="step-label">Flush bridge packets</div>
        </button>
        <button class="step-btn" onclick="doReset()">
          <div class="step-num">Reset</div>
          <div class="step-label">Clear the mesh</div>
        </button>
      </div>

      <div class="grid">
        <div class="card">
          <h2>Compose Payment</h2>
          <label>Sender</label>
          <select id="sender">
            <option value="alice">Alice</option>
            <option value="bob">Bob</option>
            <option value="charlie">Charlie</option>
            <option value="diana">Diana</option>
          </select>
          <label>Receiver</label>
          <select id="receiver">
            <option value="bob">Bob</option>
            <option value="alice">Alice</option>
            <option value="charlie">Charlie</option>
            <option value="eve">Eve</option>
          </select>
          <label>Amount (₹)</label>
          <input type="number" id="amount" value="100" min="1" />
          <label>PIN</label>
          <input
            type="password"
            id="pin"
            value="1234"
            placeholder="Any 4+ digits"
          />
          <button
            class="btn primary"
            onclick="doSend()"
            style="margin-top: 10px"
          >
            Send into Mesh
          </button>
        </div>

        <div class="card">
          <h2>Mesh Devices</h2>
          <div id="mesh-state">Loading…</div>
          <div class="btn-row">
            <button class="btn secondary" onclick="doGossip()">
              Gossip round
            </button>
            <button class="btn secondary" onclick="doFlush()">
              Flush bridges
            </button>
          </div>
        </div>

        <div class="card">
          <h2>Account Balances</h2>
          <table>
            <thead>
              <tr>
                <th>User</th>
                <th>Balance</th>
              </tr>
            </thead>
            <tbody id="accounts-body">
              <tr>
                <td colspan="2">Loading…</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="card">
          <h2>Transaction Ledger</h2>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>From / To</th>
                <th>₹</th>
              </tr>
            </thead>
            <tbody id="tx-body">
              <tr>
                <td colspan="3">No transactions yet</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h2>Activity Log</h2>
        <div class="log" id="log"><p>Server started.</p></div>
      </div>
    </div>

    <script>
      const log = (msg, cls = "") => {
        const d = document.getElementById("log");
        const p = document.createElement("p");
        p.innerHTML = `<span style="color:var(--muted)">${new Date().toLocaleTimeString()}</span>  ${msg}`;
        if (cls)
          p.style.color =
            cls === "ok" ? "#86efac" : cls === "err" ? "#fca5a5" : "#fcd34d";
        d.prepend(p);
      };

      const api = async (method, path, body) => {
        const opts = {
          method,
          headers: { "Content-Type": "application/json" },
        };
        if (body) opts.body = JSON.stringify(body);
        const r = await fetch("/api" + path, opts);
        return r.json();
      };

      const refreshAll = () => {
        loadAccounts();
        loadTx();
        loadMesh();
      };

      async function loadAccounts() {
        const rows = await api("GET", "/accounts");
        document.getElementById("accounts-body").innerHTML = rows
          .map(
            (r) =>
              `<tr><td>${r.name}</td><td>₹${r.balance.toFixed(2)}</td></tr>`,
          )
          .join("");
      }

      async function loadTx() {
        const rows = await api("GET", "/transactions");
        if (!rows.length) {
          document.getElementById("tx-body").innerHTML =
            '<tr><td colspan="3">No transactions yet</td></tr>';
          return;
        }
        document.getElementById("tx-body").innerHTML = rows
          .map(
            (r) =>
              `<tr><td>#${r.id}</td><td>${r.sender_name} to ${r.receiver_name}</td><td>₹${r.amount.toFixed(2)}</td></tr>`,
          )
          .join("");
      }

      async function loadMesh() {
        const devices = await api("GET", "/mesh/state");
        document.getElementById("mesh-state").innerHTML = devices
          .map(
            (d) =>
              `<div class="device-row">
       <div class="device-meta">
         <div class="device-dot ${d.has_internet ? "online" : ""}"></div>
         <span>${d.device_id}</span>
         ${d.has_internet ? '<span class="device-chip">bridge</span>' : ""}
       </div>
       <span style="font-size:.9rem;color:var(--muted)">${d.packet_count} packet${d.packet_count !== 1 ? "s" : ""}</span>
     </div>`,
          )
          .join("");
      }

      async function doSend() {
        const body = {
          sender_id: document.getElementById("sender").value,
          receiver_id: document.getElementById("receiver").value,
          amount: parseFloat(document.getElementById("amount").value),
          pin: document.getElementById("pin").value,
        };
        const r = await api("POST", "/demo/send", body);
        log(
          `Packet ${r.packet_id?.slice(0, 8)}... injected. TTL=${r.ttl}`,
          "ok",
        );
        refreshAll();
      }

      async function doGossip() {
        await api("POST", "/mesh/gossip");
        log("Gossip round complete");
        loadMesh();
      }

      async function doFlush() {
        const r = await api("POST", "/mesh/flush");
        (r.results || []).forEach((res) => {
          const badge =
            res.outcome === "SETTLED"
              ? '<span class="badge settled">Settled</span>'
              : res.outcome === "DUPLICATE_DROPPED"
                ? '<span class="badge duplicate">Duplicate</span>'
                : '<span class="badge invalid">Invalid</span>';
          log(
            `${res.bridge}: ${badge} ${res.reason || "tx#" + res.transaction_id}`,
            res.outcome === "SETTLED"
              ? "ok"
              : res.outcome === "DUPLICATE_DROPPED"
                ? "warn"
                : "err",
          );
        });
        if (!r.results?.length) log("No bridge packets to flush", "warn");
        refreshAll();
      }

      async function doReset() {
        await api("POST", "/mesh/reset");
        log("Mesh and idempotency cache cleared", "warn");
        loadMesh();
      }

      refreshAll();
      setInterval(refreshAll, 5000);
    </script>
  </body>
</html>
